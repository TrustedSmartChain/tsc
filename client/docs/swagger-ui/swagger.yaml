swagger: '2.0'
info:
  title: TSC - gRPC Gateway docs
  description: A REST interface for state queries and transactions.
  version: 1.0.0
paths:
  /distro/v1/params:
    get:
      summary: Params queries all parameters of the module.
      operationId: DistroParams
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              params:
                description: params defines the parameters of the module.
                type: object
                properties:
                  minting_address:
                    type: string
                  receiving_address:
                    type: string
                  denom:
                    type: string
                  max_supply:
                    type: string
                  distribution_start_date:
                    type: string
                  months_in_halving_period:
                    type: string
                    format: uint64
            description: >-
              QueryParamsResponse is the response type for the Query/Params RPC
              method.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: integer
                format: int32
              message:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    type_url:
                      type: string
                    value:
                      type: string
                      format: byte
      tags:
        - Query
  /tsc/lockup/account_locks:
    get:
      summary: AccountLocks queries active locks for multiple addresses.
      operationId: AccountLocks
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              accounts:
                type: array
                items:
                  type: object
                  properties:
                    address:
                      type: string
                    locks:
                      type: array
                      items:
                        type: object
                        properties:
                          unlock_date:
                            type: string
                          amount:
                            type: object
                            properties:
                              denom:
                                type: string
                              amount:
                                type: string
                            description: >-
                              Coin defines a token with a denomination and an
                              amount.


                              NOTE: The amount field is an Int which implements
                              the custom method

                              signatures required by gogoproto.
              pagination:
                type: object
                properties:
                  next_key:
                    type: string
                    format: byte
                    description: |-
                      next_key is the key to be passed to PageRequest.key to
                      query the next page most efficiently. It will be empty if
                      there are no more results.
                  total:
                    type: string
                    format: uint64
                    title: >-
                      total is total number of results available if
                      PageRequest.count_total

                      was set, its value is undefined otherwise
                description: >-
                  PageResponse is to be embedded in gRPC response messages where
                  the

                  corresponding request message has used PageRequest.

                   message SomeResponse {
                           repeated Bar results = 1;
                           PageResponse page = 2;
                   }
            description: >-
              QueryAccountLocksResponse is response type for the
              Query/AccountLocks RPC method.
        default:
          description: An unexpected error response.
