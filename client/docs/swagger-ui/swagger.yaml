  /webstack/licenses/license/{type_id}/{id}:
    get:
      summary: License queries a license by type id and license id.
      operationId: License
      responses:
        '200':
          description: A successful response.
          schema:
            type: object
            properties:
              license:
                type: object
                properties:
                  id:
                    type: string
                    format: uint64
                    description: >-
                      id is the auto-incremented identifier, unique within the
                      license type.
                  type:
                    type: string
                    description: type is the LicenseType.id this license was issued from.
                  holder:
                    type: string
                    description: holder is the address that owns this license.
                  start_date:
                    type: string
                    description: start_date is the date from which the license is valid.
                  end_date:
                    type: string
                    description: end_date is the expiry date. Empty string means no expiry.
                  status:
                    type: string
                    description: status is "active" or "revoked".
                description: License represents an issued license instance.
            description: >-
              QueryLicenseResponse is the response type for the Query/License
              RPC method.
        default:
          description: An unexpected error response.
          schema:
            type: object
            properties:
